name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request: null
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            build: npm run build -- --target aarch64-apple-darwin
          - runner: macos-latest
            target: x86_64-apple-darwin
            build: npm run build -- --target x86_64-apple-darwin
          # - runner: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   build: npm run build -- --target x86_64-pc-windows-msvc
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npm run build -- --target x86_64-unknown-linux-gnu
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: npm run build -- --target x86_64-unknown-linux-musl --cross-compile
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: npm run build -- --target aarch64-unknown-linux-gnu --use-napi-cross
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: npm run build -- --target aarch64-unknown-linux-musl --cross-compile
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          # # temporarily disable caching because tag pushes are identified as different refs
          # cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # - name: Cache Rust build
      #   uses: Swatinem/rust-cache@v2
      #   with:
      #     shared-key: release-${{ matrix.target }}
      #     cache-on-failure: true

      - name: Setup Zig for musl
        uses: mlugg/setup-zig@v2
        if: ${{ contains(matrix.target, 'musl') }}

      - name: Install dependencies
        run: npm ci

      - name: Build binary
        run: ${{ matrix.build }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          # cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create per-target npm package dirs
        run: npx napi create-npm-dirs

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-*
          path: artifacts
          merge-multiple: true

      - name: Place binaries into npm target packages
        run: npm run artifacts -- --output-dir artifacts --npm-dir npm

      - name: Restore JS entry artifacts for main package
        shell: bash
        run: |
          mkdir -p dist
          shopt -s nullglob
          cp artifacts/*.js dist/
          cp artifacts/*.d.ts dist/

      - name: Use pushed tag as package version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" ]]; then
            echo "Invalid tag: $GITHUB_REF_NAME"
            exit 1
          fi
          npm pkg set version="$VERSION"

      - name: Set npm dist-tag for prerelease
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            npm config set tag next
          fi

      - name: Publish target binding packages and sync optionalDependencies
        shell: bash
        run: npx napi pre-publish --no-gh-release -t npm

      - name: Publish main package
        shell: bash
        # no token required by trusted publish
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="next"
          else
            DIST_TAG="latest"
          fi
          npm publish --access public --provenance --tag "$DIST_TAG"
